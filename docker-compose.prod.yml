services:
  postgres:
    ports: []
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    ports: []
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "127.0.0.1:3000:3000"
    restart: always
    volumes:
      - /var/www/jobarm-uploads:/var/www/jobarm-uploads
    environment:
      UPLOAD_DIR: /var/www/jobarm-uploads/avatars
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
