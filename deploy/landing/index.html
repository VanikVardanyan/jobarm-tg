<!DOCTYPE html>
<html lang="hy">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JobArm</title>
  <link rel="icon" type="image/x-icon" href="favicon.ico" />
  <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="96x96" href="favicon-96x96.png" />
  <meta name="description" content="Աշխատանք Հայաստանում — Telegram Mini App" />
  <style>
    :root {
      --bg: #0b0f1a;
      --bg2: #111827;
      --card: #161d2e;
      --border: rgba(255, 255, 255, 0.07);
      --accent: #6366f1;
      --accent2: #8b5cf6;
      --accent-glow: rgba(99, 102, 241, 0.25);
      --text: #f1f5f9;
      --muted: #64748b;
      --muted2: #94a3b8;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* ── NAV ── */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 0 24px;
      height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(11, 15, 26, 0.8);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-mark {
      width: 34px;
      height: 34px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 16px;
      color: #fff;
      flex-shrink: 0;
    }

    .logo-name {
      font-size: 18px;
      font-weight: 700;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .lang-toggle {
      display: flex;
      gap: 4px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 3px;
    }

    .lang-btn {
      padding: 5px 12px;
      border-radius: 6px;
      border: none;
      background: transparent;
      color: var(--muted);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }

    .lang-btn.active {
      background: var(--accent);
      color: #fff;
    }

    /* ── HERO ── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 120px 24px 80px;
      position: relative;
    }

    .hero::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% 0%, rgba(99, 102, 241, 0.15) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 50%, rgba(139, 92, 246, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .hero-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.3);
      color: #818cf8;
      padding: 6px 16px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 36px;
    }

    .tg-icon {
      width: 15px;
      height: 15px;
    }

    h1 {
      font-size: clamp(40px, 7vw, 72px);
      font-weight: 800;
      line-height: 1.1;
      letter-spacing: -0.02em;
      max-width: 820px;
      margin-bottom: 24px;
    }

    h1 .grad {
      background: linear-gradient(135deg, #818cf8 0%, #c084fc 50%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .hero-sub {
      font-size: clamp(17px, 2.5vw, 22px);
      color: var(--muted2);
      max-width: 580px;
      margin-bottom: 52px;
      line-height: 1.65;
    }

    .hero-cta {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      text-decoration: none;
      padding: 16px 40px;
      border-radius: 14px;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 8px 40px var(--accent-glow);
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .hero-cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 48px rgba(99, 102, 241, 0.4);
    }

    .hero-cta svg {
      width: 22px;
      height: 22px;
    }

    .hero-note {
      margin-top: 16px;
      color: var(--muted);
      font-size: 14px;
    }

    /* ── STATS ── */
    .stats {
      display: flex;
      justify-content: center;
      gap: 40px;
      flex-wrap: wrap;
      padding: 64px 24px;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
    }

    .stat {
      text-align: center;
    }

    .stat-num {
      font-size: 36px;
      font-weight: 800;
      background: linear-gradient(135deg, #818cf8, #c084fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .stat-label {
      font-size: 14px;
      color: var(--muted);
      margin-top: 4px;
    }

    /* ── FEATURES ── */
    section {
      padding: 100px 24px;
      max-width: 1100px;
      margin: 0 auto;
    }

    .section-tag {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #818cf8;
      margin-bottom: 16px;
    }

    .section-title {
      font-size: clamp(28px, 4vw, 44px);
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 16px;
      letter-spacing: -0.02em;
    }

    .section-sub {
      font-size: 18px;
      color: var(--muted2);
      max-width: 560px;
      margin-bottom: 60px;
    }

    .features-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 20px;
    }

    .feature-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 32px 28px;
      transition: border-color 0.2s;
    }

    .feature-card:hover {
      border-color: rgba(99, 102, 241, 0.3);
    }

    .feature-icon {
      width: 48px;
      height: 48px;
      background: rgba(99, 102, 241, 0.12);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      margin-bottom: 20px;
    }

    .feature-card h3 {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 10px;
      color: var(--text);
    }

    .feature-card p {
      font-size: 15px;
      color: var(--muted);
      line-height: 1.65;
    }

    /* ── HOW IT WORKS ── */
    .how-section {
      background: var(--bg2);
      padding: 100px 24px;
    }

    .how-inner {
      max-width: 1100px;
      margin: 0 auto;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 24px;
      margin-top: 60px;
    }

    .step {
      position: relative;
      text-align: center;
      padding: 40px 24px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
    }

    .step-num {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 800;
      color: #fff;
      margin: 0 auto 20px;
    }

    .step-icon {
      font-size: 36px;
      margin-bottom: 16px;
    }

    .step h3 {
      font-size: 17px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .step p {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
    }

    /* ── ROLES ── */
    .roles {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 60px;
    }

    @media (max-width: 640px) {
      .roles {
        grid-template-columns: 1fr;
      }
    }

    .role-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 36px 32px;
    }

    .role-card.master {
      border-color: rgba(139, 92, 246, 0.25);
      background: linear-gradient(145deg, var(--card), rgba(139, 92, 246, 0.05));
    }

    .role-label {
      display: inline-block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #818cf8;
      background: rgba(99, 102, 241, 0.12);
      padding: 4px 12px;
      border-radius: 999px;
      margin-bottom: 20px;
    }

    .role-label.master-label {
      color: #c084fc;
      background: rgba(139, 92, 246, 0.12);
    }

    .role-card h3 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 12px;
    }

    .role-card p {
      font-size: 15px;
      color: var(--muted2);
      margin-bottom: 24px;
      line-height: 1.65;
    }

    .role-perks {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .role-perks li {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 14px;
      color: var(--muted2);
    }

    .perk-dot {
      width: 7px;
      height: 7px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 50%;
      flex-shrink: 0;
    }

    /* ── CTA BLOCK ── */
    .cta-section {
      text-align: center;
      padding: 100px 24px;
    }

    .cta-box {
      max-width: 680px;
      margin: 0 auto;
      background: var(--card);
      border: 1px solid rgba(99, 102, 241, 0.2);
      border-radius: 28px;
      padding: 64px 40px;
      position: relative;
      overflow: hidden;
    }

    .cta-box::before {
      content: '';
      position: absolute;
      top: -60px;
      left: 50%;
      transform: translateX(-50%);
      width: 300px;
      height: 200px;
      background: radial-gradient(ellipse, rgba(99, 102, 241, 0.25) 0%, transparent 70%);
      pointer-events: none;
    }

    .cta-box h2 {
      font-size: clamp(26px, 4vw, 40px);
      font-weight: 800;
      margin-bottom: 16px;
      line-height: 1.2;
    }

    .cta-box p {
      color: var(--muted2);
      font-size: 17px;
      margin-bottom: 40px;
    }

    /* ── FOOTER ── */
    footer {
      text-align: center;
      padding: 32px 24px;
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 13px;
    }

    /* ── UTILS ── */
    .hidden {
      display: none !important;
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a class="nav-logo" href="#">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" style="height:36px;width:auto;" role="img" aria-label="JobArm">
        <defs>
          <linearGradient id="markGradNav" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#22D3EE"/>
            <stop offset="100%" stop-color="#2DD4BF"/>
          </linearGradient>
        </defs>
        <g transform="translate(8 8)">
          <path d="M 12 32 Q 12 12 32 12" fill="none" stroke="url(#markGradNav)" stroke-width="6" stroke-linecap="round"/>
          <path d="M 32 52 Q 52 52 52 32" fill="none" stroke="url(#markGradNav)" stroke-width="6" stroke-linecap="round"/>
          <circle cx="32" cy="32" r="6" fill="url(#markGradNav)"/>
        </g>
        <text x="84" y="52" font-family="system-ui,sans-serif" font-size="36" font-weight="700" letter-spacing="-1.2" fill="#F8FAFC">Jobarm</text>
      </svg>
    </a>
    <div class="lang-toggle">
      <button class="lang-btn active" onclick="setLang('hy')">ՀԱՅ</button>
      <button class="lang-btn" onclick="setLang('ru')">РУС</button>
    </div>
  </nav>

  <!-- HERO -->
  <section class="hero">
    <div class="hero-badge">
      <svg class="tg-icon" viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M11.944 0A12 12 0 1 0 24 12 12 12 0 0 0 11.944 0Zm5.992 8.325-2.029 9.55c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.892.671Z" />
      </svg>
      <span data-hy="Telegram Mini App" data-ru="Telegram Mini App">Telegram Mini App</span>
    </div>

    <h1>
      <span data-hy='Վարպետներ և պատվիրատուներ՝<br/><span class="grad">մեկ հարթակում</span>'
        data-ru='Найди мастера<br/>без лишних шагов —<br/><span class="grad">в Армении</span>'></span>
    </h1>

    <p class="hero-sub"
      data-hy="Տեղադրեք առաջադրանք կամ առաջարկեք ձեր ծառայությունները։ Ամեն ինչ՝ Telegram-ի ներսում, առանց ավելորդ քայլերի։"
      data-ru="Размещайте задания или предлагайте услуги. Всё внутри Telegram — без лишних шагов."></p>

    <a class="hero-cta" href="https://t.me/jobarm_dev_bot" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path
          d="M11.944 0A12 12 0 1 0 24 12 12 12 0 0 0 11.944 0Zm5.992 8.325-2.029 9.55c-.145.658-.537.818-1.084.508l-3-2.21-1.447 1.394c-.16.16-.295.295-.605.295l.213-3.053 5.56-5.023c.242-.213-.054-.333-.373-.12l-6.871 4.326-2.962-.924c-.643-.204-.657-.643.136-.953l11.57-4.461c.537-.194 1.006.131.892.671Z" />
      </svg>
      <span data-hy="Բացել Telegram-ում" data-ru="Открыть в Telegram"></span>
    </a>

    <p class="hero-note" data-hy="Անվճար · Telegram-ի ներսում" data-ru="Бесплатно · Внутри Telegram"></p>
  </section>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num">10+</div>
      <div class="stat-label" data-hy="Կատեգորիաներ" data-ru="Категорий"></div>
    </div>
    <div class="stat">
      <div class="stat-num">⚡</div>
      <div class="stat-label" data-hy="Արագ արձագանք" data-ru="Быстрый отклик"></div>
    </div>
    <div class="stat">
      <div class="stat-num">🇦🇲</div>
      <div class="stat-label" data-hy="Հայաստան" data-ru="Армения"></div>
    </div>
    <div class="stat">
      <div class="stat-num">24/7</div>
      <div class="stat-label" data-hy="Հասանելի" data-ru="Доступно"></div>
    </div>
  </div>

  <!-- FEATURES -->
  <section>
    <p class="section-tag" data-hy="Ինչու JobArm" data-ru="Почему JobArm"></p>
    <h2 class="section-title" data-hy="Ամեն ինչ, ինչ ձեզ պետք է" data-ru="Всё что нужно"></h2>
    <p class="section-sub" data-hy="Ոչ մի ավելորդ հավելված, ոչ մի գրանցում — միայն Telegram"
      data-ru="Никаких лишних приложений и регистраций — только Telegram"></p>

    <div class="features-grid">
      <div class="feature-card">
        <div class="feature-icon">⚡</div>
        <h3 data-hy="Արագ" data-ru="Быстро"></h3>
        <p data-hy="Տեղադրեք հայտ կամ ստացեք արձագանք րոպեների ընթացքում"
          data-ru="Разместите задание и получайте отклики в течение минут"></p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">⭐</div>
        <h3 data-hy="Հուսալի" data-ru="Надёжно"></h3>
        <p data-hy="Վարկանիշ, կարծիքներ, ստուգված վարպետներ — ընտրեք լավագույնին"
          data-ru="Рейтинги, отзывы и проверенные мастера — выбирайте лучших"></p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">💬</div>
        <h3 data-hy="Հարմար" data-ru="Удобно"></h3>
        <p data-hy="Ամեն ինչ Telegram-ի ներսում՝ ծանուցումներ, կապ, վճարում"
          data-ru="Всё в Telegram — уведомления, связь, подтверждение выполнения"></p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🔒</div>
        <h3 data-hy="Անվտանգ" data-ru="Безопасно"></h3>
        <p data-hy="Telegram-ի ստուգումը, ծածկագրված կապ, հաճախորդի հաստատումը"
          data-ru="Верификация Telegram, зашифрованная связь, подтверждение заказчика"></p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🏷️</div>
        <h3 data-hy="Թափանցիկ գին" data-ru="Прозрачная цена"></h3>
        <p data-hy="Բյուջեն նախապես հայտնի է, ոչ մի թաքնված ծախս"
          data-ru="Бюджет известен заранее, никаких скрытых расходов"></p>
      </div>
      <div class="feature-card">
        <div class="feature-icon">🌍</div>
        <h3 data-hy="Երկու լեզու" data-ru="Два языка"></h3>
        <p data-hy="Հայերեն և ռուսերեն — ըստ ձեր նախընտրության" data-ru="Армянский и русский — на ваш выбор"></p>
      </div>
    </div>
  </section>

  <!-- HOW IT WORKS -->
  <div class="how-section">
    <div class="how-inner">
      <p class="section-tag" data-hy="Ինչպես է աշխատում" data-ru="Как это работает"></p>
      <h2 class="section-title" data-hy="Երեք քայլ" data-ru="Три шага"></h2>
      <p class="section-sub" data-hy="Ոչ մի բարդ գրանցում, ոչ մի սպասում"
        data-ru="Никакой сложной регистрации и ожидания"></p>

      <div class="steps">
        <div class="step">
          <div class="step-num">1</div>
          <div class="step-icon">📝</div>
          <h3 data-hy="Տեղադրեք հայտ" data-ru="Разместите задание"></h3>
          <p data-hy="Ընտրեք կատեգորիա, նկարագրեք գործը, նշեք բյուջե և ժամկետ"
            data-ru="Выберите категорию, опишите задание, укажите бюджет и сроки"></p>
        </div>
        <div class="step">
          <div class="step-num">2</div>
          <div class="step-icon">🔍</div>

  <script>
    let currentLang = 'hy';

    function setLang(lang) {
      currentLang = lang;
      document.documentElement.lang = lang;

      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent.toLowerCase().includes(lang === 'hy' ? 'հայ' : 'рус'));
      });

      document.querySelectorAll('[data-hy]').forEach(el => {
        const text = el.getAttribute('data-' + lang);
        if (text !== null) el.innerHTML = text;
      });
    }

    // Init
    setLang('hy');
  </script>
