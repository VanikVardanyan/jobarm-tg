<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" role="img" aria-label="Jobarm">
  <defs>
    <linearGradient id="markGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0E7C8A"/>
      <stop offset="100%" stop-color="#14B8A6"/>
    </linearGradient>
  </defs>

  <!-- Mark: two arcs meeting at a center node = connection / handshake -->
  <g transform="translate(8 8)">
    <!-- left arc -->
    <path d="M 12 32 Q 12 12 32 12"
          fill="none" stroke="url(#markGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- right arc, mirrored and offset down -->
    <path d="M 32 52 Q 52 52 52 32"
          fill="none" stroke="url(#markGrad)" stroke-width="6" stroke-linecap="round"/>
    <!-- connecting node where the two meet -->
    <circle cx="32" cy="32" r="6" fill="url(#markGrad)"/>
  </g>

  <!-- Wordmark -->
  <text x="84" y="52"
        font-family="'Inter', 'SF Pro Display', system-ui, sans-serif"
        font-size="36"
        font-weight="700"
        letter-spacing="-1.2"
        fill="#0F172A">Jobarm</text>
</svg>
