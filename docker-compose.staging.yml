services:
  postgres:
    ports: []
    restart: always
    environment:
      POSTGRES_USER: jobbarm_staging
      POSTGRES_PASSWORD: jobbarm_staging
      POSTGRES_DB: jobbarm_staging
    volumes:
      - pg_data_staging:/var/lib/postgresql/data
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    ports: []
    restart: always
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  api:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    ports:
      - "127.0.0.1:3001:3000"
    restart: always
    environment:
      DATABASE_URL: postgresql://jobbarm_staging:jobbarm_staging@postgres:5432/jobbarm_staging
      REDIS_URL: redis://redis:6379/1
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pg_data_staging:
